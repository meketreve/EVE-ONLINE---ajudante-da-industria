{% extends "base.html" %}

{% block title %}Itens &mdash; EVE Industry Tool{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Itens Fabricáveis</h1>
    <p class="subtitle">Explore todos os itens que podem ser fabricados no EVE Online.</p>
</div>

<div class="filter-bar">
    <form class="filter-form" id="filter-form">
        <div class="filter-group">
            <input
                type="text"
                name="search"
                id="search-input"
                placeholder="Buscar por nome..."
                value="{{ search }}"
                class="input-field"
                hx-get="/items"
                hx-target="#items-list"
                hx-trigger="input delay:400ms"
                hx-include="#filter-form"
                autocomplete="off"
            />
        </div>
        <div class="filter-group">
            <select
                name="category_id"
                id="category-select"
                class="input-field"
                hx-get="/items"
                hx-target="#items-list"
                hx-trigger="change"
                hx-include="#filter-form"
            >
                <option value="">Todas as Categorias</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>
                    Categoria {{ cat }}
                </option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary"
            hx-get="/items"
            hx-target="#items-list"
            hx-include="#filter-form">
            Buscar
        </button>
    </form>
</div>

<div id="items-list">
    {% include "partials/items_table.html" %}
</div>
{% endblock %}
