<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}EVE Industry Tool{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/" class="brand-link">
                <span class="brand-icon">&#9671;</span>
                <span class="brand-name">EVE Industry Tool</span>
            </a>
        </div>
        <ul class="navbar-links">
            <li><a href="/" class="nav-link">Dashboard</a></li>
            <li><a href="/items" class="nav-link">Itens</a></li>
            <li><a href="/queue" class="nav-link">Fila de Produção</a></li>
            <li><a href="/market/" class="nav-link">Mercado</a></li>
            <li><a href="/industry/ranking" class="nav-link">Ranking</a></li>
            <li><a href="/settings/" class="nav-link">Configurações</a></li>
        </ul>
        <div class="navbar-auth">
            {% if character_name %}
                <span class="character-name">&#128100; {{ character_name }}</span>
                <a href="/auth/logout" class="btn btn-outline">Sair</a>
            {% else %}
                <a href="/auth/login" class="btn btn-primary">Entrar com EVE Online</a>
            {% endif %}
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>EVE Industry Profit Tool &mdash; Não afiliado à CCP Games.</p>
    </footer>
</body>
</html>
